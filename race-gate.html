<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Race Gate & Camera Tilt</title>
<link rel="stylesheet" href="maker-viz.css">
</head><body>
<a class="mv-nav" href="index.html">← Back</a>
<div id="app"></div>
<script src="maker-viz.js"></script>
<script>
function stage(s){
  // FPV view — horizon tilt depends on camera tilt + drone pitch
  const horizonY = 100 + (s.pitch - s.camTilt) * 2;
  const roll = s.roll;
  // Gate distance = drone pitch angle scaled
  const gateSize = Math.max(20, 200 - s.pitch * 6);
  return `<svg viewBox="0 0 540 220">
    <rect x="20" y="20" width="500" height="180" fill="#1A1A2E" stroke="#264653" stroke-width="3" rx="6"/>
    <!-- sky/ground -->
    <g transform="translate(270,110) rotate(${roll})">
      <rect x="-500" y="-500" width="1000" height="${500 + (horizonY - 110)}" fill="#457B9D"/>
      <rect x="-500" y="${horizonY - 110}" width="1000" height="500" fill="#8B5A2B"/>
      <line x1="-500" y1="${horizonY - 110}" x2="500" y2="${horizonY - 110}" stroke="#FFD700" stroke-width="2"/>
    </g>
    <!-- gate -->
    <g transform="translate(270,110)">
      <rect x="${-gateSize/2}" y="${-gateSize/2}" width="${gateSize}" height="${gateSize}" fill="none" stroke="#E63946" stroke-width="6"/>
    </g>
    <!-- crosshair -->
    <line x1="260" y1="110" x2="280" y2="110" stroke="#FFD700" stroke-width="2"/>
    <line x1="270" y1="100" x2="270" y2="120" stroke="#FFD700" stroke-width="2"/>
    <text x="270" y="215" text-anchor="middle" font-size="11" fill="#264653">pitch ${s.pitch.toFixed(0)}° · roll ${s.roll.toFixed(0)}° · cam tilt ${s.camTilt.toFixed(0)}°</text>
  </svg>`;
}

MakerViz.create({
  mount: '#app',
  title: '🏁 Race Gate + Camera Tilt',
  subtitle: 'Camera angle changes where the horizon sits!',
  vars: {
    camTilt: { label:'📷 tilt', value: 20, color:'#FF6B35', note:'°' },
    pitch:   { label:'📐 pitch',value: 0,  color:'#E63946', note:'°' }
  },
  extras: [
    { kind:'slider', id:'cS', label:'Camera tilt (°)', min:0, max:45, value:20, step:1, onInput(v,s){ s.camTilt = v; }},
    { kind:'slider', id:'pS', label:'Drone pitch (°)', min:-10, max:40, value:10, step:1, onInput(v,s){ s.pitch = v; }},
    { kind:'slider', id:'rS', label:'Drone roll (°)',  min:-45, max:45, value:0, step:5, onInput(v,s){ s.roll = v; }}
  ],
  lines: [
    'Camera tilt sets "natural" cruise pitch',
    'horizon in view = pitch − camTilt',
    'More tilt → fly fast without nose-down view',
    'Freestyle: low tilt · racing: high tilt'
  ],
  phases: ['read','horizon','match','render'],
  onInit(s){ s.camTilt = 20; s.pitch = 10; s.roll = 0; },
  stage,
  run(phase, s, ui){
    const n = ['read','horizon','match','render'].indexOf(phase)+1;
    ui.activeLine(n);
    if (phase === 'match') ui.narrate(`horizon offset = ${s.pitch - s.camTilt}°`);
  }
});
</script>
</body></html>
