<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Angle of Attack / Stall</title>
<link rel="stylesheet" href="maker-viz.css">
</head><body>
<a class="mv-nav" href="index.html">← Back</a>
<div id="app"></div>
<script src="maker-viz.js"></script>
<script>
function liftCoef(aoa){ return aoa < 15 ? aoa * 0.08 : aoa < 20 ? 1.2 - (aoa-15)*0.15 : Math.max(0.1, 1.2 - (aoa-15)*0.15); }
function stage(s){
  const lift = liftCoef(s.aoa) * 100;
  const stalled = s.aoa > 15;
  return `<svg viewBox="0 0 540 260">
    <rect width="540" height="260" fill="#B0E0E6"/>
    <g transform="translate(270,130) rotate(${-s.aoa})">
      <path d="M -80 0 Q 0 -20 80 0 Q 0 10 -80 0 Z" fill="${stalled?'#E63946':'#FFD700'}" stroke="#264653" stroke-width="3"/>
      ${!stalled ? '<path d="M -80 10 Q 0 20 80 10" fill="none" stroke="#457B9D" stroke-width="2" stroke-dasharray="3 3"/>' : ''}
      ${stalled ? Array.from({length:6},(_,i)=>`<circle cx="${-30+i*20}" cy="${-10-i*4}" r="${3+i}" fill="#CCC" opacity="0.7"/>`).join('') : ''}
    </g>
    <!-- lift arrow -->
    <g transform="translate(270,130)">
      <line x1="0" y1="0" x2="0" y2="${-lift}" stroke="#40BF4A" stroke-width="4" marker-end="url(#la)"/>
      <text x="8" y="${-lift/2}" font-size="11" fill="#40BF4A" font-weight="bold">lift ${lift.toFixed(0)}</text>
    </g>
    <defs><marker id="la" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#40BF4A"/></marker></defs>
    <text x="270" y="240" text-anchor="middle" font-size="13" font-weight="bold" fill="${stalled?'#E63946':'#264653'}">${stalled ? '💥 STALL — lift collapses!' : '✈️ lift growing with AoA'}</text>
  </svg>`;
}

MakerViz.create({
  mount: '#app',
  title: '✈️ Angle of Attack & Stall',
  subtitle: 'Too much angle = lift collapses!',
  vars: {
    aoa:  { label:'📐 AoA',  value: 5, color:'#FF6B35', note:'degrees' },
    lift: { label:'⬆️ lift', value: 0, color:'#40BF4A' }
  },
  extras: [
    { kind:'slider', id:'aS', label:'AoA (°)', min:0, max:30, value:5, step:1, onInput(v,s){ s.aoa = v; }}
  ],
  lines: [
    'READ angle of attack',
    'compute lift coefficient',
    'IF AoA > ~15° → flow separates → stall',
    'lift = coef × speed²'
  ],
  phases: ['read','coef','check','apply'],
  onInit(s){ s.aoa = 5; s.lift = 0; },
  onReset(s){ s.aoa = 5; s.lift = 0; },
  stage,
  run(phase, s, ui){
    if (phase === 'read') ui.activeLine(1);
    else if (phase === 'coef') { ui.activeLine(2); const l = liftCoef(s.aoa) * 100; ui.setVar('lift', l, { display: l.toFixed(0), flash:true }); }
    else if (phase === 'check') { ui.activeLine(3); if (s.aoa > 15) ui.check(3, true); ui.narrate(s.aoa > 15 ? '💥 STALLED!' : 'laminar flow'); }
    else if (phase === 'apply') ui.activeLine(4);
  }
});
</script>
</body></html>
