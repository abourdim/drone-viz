<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tricopter Yaw</title>
<link rel="stylesheet" href="maker-viz.css">
</head><body>
<a class="mv-nav" href="index.html">← Back</a>
<div id="app"></div>
<script src="maker-viz.js"></script>
<script>
function stage(s){
  const cx = 270, cy = 150;
  return `<svg viewBox="0 0 540 280">
    <rect width="540" height="280" fill="#F4E8CB"/>
    <!-- frame -->
    <line x1="${cx-100}" y1="${cy-60}" x2="${cx+100}" y2="${cy-60}" stroke="#264653" stroke-width="5"/>
    <line x1="${cx}" y1="${cy-60}" x2="${cx}" y2="${cy+80}" stroke="#264653" stroke-width="5"/>
    <!-- Front motors -->
    <g transform="translate(${cx-100},${cy-60})"><circle r="18" fill="#40BF4A" stroke="#264653" stroke-width="3"/><text y="4" text-anchor="middle" font-weight="bold" font-size="12" fill="#FFF">FL</text></g>
    <g transform="translate(${cx+100},${cy-60})"><circle r="18" fill="#40BF4A" stroke="#264653" stroke-width="3"/><text y="4" text-anchor="middle" font-weight="bold" font-size="12" fill="#FFF">FR</text></g>
    <!-- Tail servo -->
    <g transform="translate(${cx},${cy+80})">
      <rect x="-12" y="-10" width="24" height="20" fill="#FFD700" stroke="#264653" stroke-width="2"/>
      <g transform="rotate(${s.servoAngle})">
        <circle cy="0" r="18" fill="#E63946" stroke="#264653" stroke-width="3"/>
        <text y="4" text-anchor="middle" font-weight="bold" font-size="12" fill="#FFF">T</text>
      </g>
    </g>
    <!-- torque arrow -->
    <g transform="translate(${cx},${cy}) rotate(${s.yawCmd * 5})">
      <path d="M 0 -50 A 50 50 0 0 1 40 0" fill="none" stroke="#FF6B35" stroke-width="3" marker-end="url(#a)"/>
    </g>
    <defs><marker id="a" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#FF6B35"/></marker></defs>
    <text x="20" y="260" font-size="12" font-weight="bold" fill="#264653">yaw cmd = ${s.yawCmd} → servo ${s.servoAngle.toFixed(0)}° (tilts tail thrust sideways)</text>
  </svg>`;
}

MakerViz.create({
  mount: '#app',
  title: '🛸 Tricopter Yaw Servo',
  subtitle: 'Tilt the tail motor to steer — no opposing-prop trick!',
  vars: {
    yawCmd:     { label:'🔄 yaw cmd',  value: 0, color:'#FF6B35' },
    servoAngle: { label:'🎛️ servo°', value: 0, color:'#E63946' }
  },
  extras: [
    { kind:'slider', id:'yS', label:'Yaw stick', min:-30, max:30, value:0, step:5, onInput(v,s){ s.yawCmd = v; }}
  ],
  lines: [
    'READ yaw stick',
    'servoAngle = yawCmd × scale',
    'Tail motor thrust tilts sideways',
    'Side-thrust × lever = yaw torque'
  ],
  phases: ['read','mix','tilt','torque'],
  onInit(s){ s.yawCmd = 0; s.servoAngle = 0; },
  onReset(s){ s.yawCmd = 0; s.servoAngle = 0; },
  stage,
  run(phase, s, ui){
    if (phase === 'read') ui.activeLine(1);
    else if (phase === 'mix') { ui.activeLine(2); s.servoAngle = s.yawCmd; ui.setVar('servoAngle', s.servoAngle, { display: s.servoAngle+'°', flash:true }); }
    else if (phase === 'tilt') ui.activeLine(3);
    else if (phase === 'torque') { ui.activeLine(4); ui.narrate(s.yawCmd ? `↪️ yawing ${s.yawCmd>0?'right':'left'}` : 'no yaw'); }
  }
});
</script>
</body></html>
