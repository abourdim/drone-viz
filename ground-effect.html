<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ground Effect</title>
<link rel="stylesheet" href="maker-viz.css">
</head><body>
<a class="mv-nav" href="index.html">← Back</a>
<div id="app"></div>
<script src="maker-viz.js"></script>
<script>
function effect(altM){ // ~+10% at 0, falls off quickly
  return Math.max(0, 0.10 * Math.exp(-altM/0.4));
}
function stage(s){
  const yDrone = 240 - s.alt*18;
  const bonus = effect(s.alt);
  return `<svg viewBox="0 0 540 280">
    <rect width="540" height="280" fill="#B0E0E6"/>
    <rect x="0" y="240" width="540" height="40" fill="#8B5A2B"/>
    <line x1="0" y1="240" x2="540" y2="240" stroke="#264653" stroke-width="2"/>
    <g transform="translate(270,${yDrone})">
      <rect x="-50" y="-5" width="100" height="10" fill="#264653" rx="3"/>
      <circle cx="-50" cy="0" r="8" fill="#FFD700"/>
      <circle cx="50" cy="0" r="8" fill="#FFD700"/>
      ${bonus > 0.02 ? `<ellipse cx="0" cy="${240-yDrone}" rx="${60 + bonus*300}" ry="${10 + bonus*40}" fill="#FFD700" opacity="${bonus*3}"/>` : ''}
    </g>
    <g transform="translate(20,30)">
      <text font-size="12" font-weight="bold" fill="#264653">alt: ${s.alt.toFixed(2)}m</text>
      <text y="18" font-size="12" font-weight="bold" fill="#FF6B35">thrust bonus: +${(bonus*100).toFixed(1)}%</text>
      <text y="36" font-size="12" font-weight="bold" fill="${bonus>0.02?'#40BF4A':'#666'}">hover PWM: ${(55*(1-bonus)).toFixed(1)}%</text>
    </g>
  </svg>`;
}

MakerViz.create({
  mount: '#app',
  title: '🏖️ Ground Effect',
  subtitle: 'Near ground → bonus thrust → floaty landings!',
  vars: {
    alt:   { label:'🎈 altitude',  value: 2, color:'#264653', note:'m' },
    bonus: { label:'📈 bonus', value: 0, color:'#FF6B35', note:'% extra thrust' }
  },
  extras: [
    { kind:'slider', id:'aS', label:'Altitude (cm)', min:0, max:400, value:200, step:10, onInput(v,s){ s.alt = v/100; }}
  ],
  lines: [
    'MEASURE altitude above ground',
    'Air gets trapped under props → higher pressure',
    'bonus decays exponentially with altitude',
    'hover PWM drops near ground'
  ],
  phases: ['alt','trap','decay','pwm'],
  onInit(s){ s.alt = 2; s.bonus = 0; },
  onReset(s){ s.alt = 2; s.bonus = 0; },
  stage,
  run(phase, s, ui){
    if (phase === 'alt') ui.activeLine(1);
    else if (phase === 'trap') { ui.activeLine(2); ui.narrate('💨 air trapped = denser column'); }
    else if (phase === 'decay') { ui.activeLine(3); s.bonus = effect(s.alt)*100; ui.setVar('bonus', s.bonus, { display: s.bonus.toFixed(1)+'%', flash:true }); }
    else if (phase === 'pwm') { ui.activeLine(4); ui.narrate(s.bonus > 2 ? '✨ floaty — reduce throttle on touchdown' : 'out of ground effect'); }
  }
});
</script>
</body></html>
