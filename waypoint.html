<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Waypoint Mission</title>
<link rel="stylesheet" href="maker-viz.css">
</head><body>
<a class="mv-nav" href="index.html">← Back</a>
<div id="app"></div>
<script src="maker-viz.js"></script>
<script>
const WP = [
  {x:80,y:200}, {x:200,y:80}, {x:340,y:80}, {x:460,y:200}, {x:340,y:260}, {x:200,y:260}
];
function stage(s){
  return `<svg viewBox="0 0 540 320">
    <rect width="540" height="320" fill="#F4E8CB"/>
    <!-- path -->
    <polyline points="${WP.map(w=>`${w.x},${w.y}`).join(' ')}" fill="none" stroke="#264653" stroke-width="2" stroke-dasharray="4 4"/>
    ${WP.map((w,i)=>`<g><circle cx="${w.x}" cy="${w.y}" r="${i===s.targetIdx?14:10}" fill="${i===s.targetIdx?'#FF6B35':'#457B9D'}" stroke="#FFF" stroke-width="2"/><text x="${w.x}" y="${w.y+4}" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFF">${i+1}</text></g>`).join('')}
    <!-- trail -->
    <polyline points="${s.trail.map(p=>`${p.x},${p.y}`).join(' ')}" fill="none" stroke="#40BF4A" stroke-width="2"/>
    <!-- lookahead circle -->
    <circle cx="${s.drone.x}" cy="${s.drone.y}" r="${s.lookahead}" fill="none" stroke="#FFD700" stroke-width="1.5" stroke-dasharray="2 2"/>
    <!-- drone -->
    <g transform="translate(${s.drone.x},${s.drone.y})">
      <circle r="10" fill="#E63946" stroke="#264653" stroke-width="2"/>
      <text y="4" text-anchor="middle" font-size="11" fill="#FFF">🚁</text>
    </g>
    <text x="20" y="310" font-size="11" fill="#264653">lookahead = ${s.lookahead} · lower = tighter corners, higher = smoother arcs</text>
  </svg>`;
}

MakerViz.create({
  mount: '#app',
  title: '🗺️ Waypoint Mission',
  subtitle: 'Pure pursuit — lookahead distance = cornering style',
  vars: {
    targetIdx: { label:'🎯 target', value: 0, color:'#FF6B35' },
    dist:      { label:'📏 to target', value: 0, color:'#2A9D8F' }
  },
  extras: [
    { kind:'slider', id:'lS', label:'Lookahead', min:10, max:120, value:40, step:5, onInput(v,s){ s.lookahead = v; }}
  ],
  lines: [
    'FIND nearest forward waypoint (within lookahead)',
    'COMPUTE bearing to it',
    'STEER toward bearing',
    'WHEN within 20px → next waypoint'
  ],
  phases: ['find','bearing','steer','advance'],
  onInit(s){ s.lookahead = 40; s.drone = {x: WP[0].x, y: WP[0].y}; s.trail = [{...s.drone}]; s.targetIdx = 1; },
  onReset(s){ s.drone = {x: WP[0].x, y: WP[0].y}; s.trail = [{...s.drone}]; s.targetIdx = 1; },
  stage,
  run(phase, s, ui){
    const target = WP[s.targetIdx];
    const dx = target.x - s.drone.x, dy = target.y - s.drone.y;
    const d = Math.hypot(dx, dy);
    if (phase === 'find') { ui.activeLine(1); ui.setVar('dist', Math.round(d), { display: d.toFixed(0)+'px' }); }
    else if (phase === 'bearing') { ui.activeLine(2); s.heading = Math.atan2(dy, dx); }
    else if (phase === 'steer') {
      ui.activeLine(3);
      const step = 6;
      s.drone.x += Math.cos(s.heading) * step;
      s.drone.y += Math.sin(s.heading) * step;
      s.trail.push({...s.drone});
      if (s.trail.length > 200) s.trail.shift();
    } else if (phase === 'advance') {
      ui.activeLine(4);
      if (d < 20) {
        s.targetIdx = (s.targetIdx + 1) % WP.length;
        ui.setVar('targetIdx', s.targetIdx+1, { display: s.targetIdx+1, flash:true });
        ui.narrate(`🎯 next WP: ${s.targetIdx+1}`);
      }
    }
  }
});
</script>
</body></html>
