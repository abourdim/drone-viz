<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Propwash</title>
<link rel="stylesheet" href="maker-viz.css">
</head><body>
<a class="mv-nav" href="index.html">← Back</a>
<div id="app"></div>
<script src="maker-viz.js"></script>
<script>
function stage(s){
  const W=500, H=140;
  const n = Math.max(2, s.hist.length);
  const pts = s.hist.map((v,i)=>`${(i/(n-1))*W},${H/2 - v*1.4}`).join(' ');
  const droneY = 130 + Math.sin(s.t*0.3)*s.shake*3;
  return `<svg viewBox="0 0 540 240">
    <rect x="10" y="10" width="${W+20}" height="${H+20}" fill="#0A0F1E" stroke="#FFD700" stroke-width="3" rx="8"/>
    <polyline points="${pts}" fill="none" stroke="${s.compensation?'#40BF4A':'#E63946'}" stroke-width="3" transform="translate(10,10)"/>
    <g transform="translate(450,170)">
      <rect x="-22" y="-6" width="44" height="12" rx="3" fill="#264653"/>
      <circle cx="-18" cy="0" r="6" fill="#FFD700"/>
      <circle cx="18" cy="0" r="6" fill="#FFD700"/>
      <g transform="translate(0,${droneY-170})" opacity="0.3"><path d="M -30 0 Q 0 20 30 0" fill="none" stroke="#CCC" stroke-width="2"/></g>
    </g>
    <text x="20" y="210" font-size="12" fill="#264653" font-weight="bold">Descent through own propwash = dirty air → oscillation</text>
    <text x="20" y="228" font-size="11" fill="${s.compensation?'#40BF4A':'#E63946'}">${s.compensation?'✅ compensation ON — damped':'⚠️ no compensation — shakes!'}</text>
  </svg>`;
}

MakerViz.create({
  mount: '#app',
  title: '🌀 Propwash Handling',
  subtitle: 'Descending drone flies through its own exhaust — tuner dread!',
  vars: {
    descentRate: { label:'⬇️ descent', value: 0, color:'#FF6B35', note:'m/s' },
    shake:       { label:'📳 shake',   value: 0, color:'#E63946' }
  },
  extras: [
    { kind:'slider', id:'dS', label:'Descent rate', min:0, max:10, value:0, step:1, onInput(v,s){ s.descentRate = v; }},
    { kind:'toggle', id:'cT', label:'🛡️ Compensation', value:false, onToggle(v,s){ s.compensation = v; }}
  ],
  lines: [
    'MEASURE descent rate',
    'Propwash severity ∝ descent²',
    'WITHOUT comp: PID gets confused',
    'WITH comp: pre-emptive correction damps'
  ],
  phases: ['measure','severity','pid','output'],
  onInit(s){ s.descentRate = 0; s.compensation = false; s.shake = 0; s.hist = []; s.t = 0; },
  onReset(s){ s.descentRate = 0; s.shake = 0; s.hist = []; s.t = 0; },
  stage,
  run(phase, s, ui){
    s.t += 1;
    if (phase === 'measure') ui.activeLine(1);
    else if (phase === 'severity') { ui.activeLine(2); s.severity = Math.pow(s.descentRate, 2) * 0.15; }
    else if (phase === 'pid') { ui.activeLine(3); s.shake = s.compensation ? s.severity * 0.3 : s.severity; ui.setVar('shake', Math.round(s.shake), { flash:true }); }
    else if (phase === 'output') {
      ui.activeLine(4);
      const oscil = Math.sin(s.t*0.5) * s.shake;
      s.hist.push(oscil); if (s.hist.length > 80) s.hist.shift();
    }
  }
});
</script>
</body></html>
