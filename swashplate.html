<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>CP Heli Swashplate</title>
<link rel="stylesheet" href="maker-viz.css">
</head><body>
<a class="mv-nav" href="index.html">← Back</a>
<div id="app"></div>
<script src="maker-viz.js"></script>
<script>
function stage(s){
  const bladeCount = 2;
  const bladeAz = [s.rot, s.rot + 180];
  const aoa = az => s.collective + s.cyclicPitch * Math.cos(az * Math.PI/180) + s.cyclicRoll * Math.sin(az * Math.PI/180);
  const blades = bladeAz.map(az => {
    const a = aoa(az);
    const tipX = 270 + Math.cos(az*Math.PI/180) * 120;
    const tipY = 140 + Math.sin(az*Math.PI/180) * 120;
    return `<line x1="270" y1="140" x2="${tipX}" y2="${tipY}" stroke="#E63946" stroke-width="6" stroke-linecap="round"/>
      <text x="${tipX}" y="${tipY-10}" text-anchor="middle" font-size="10" font-weight="bold" fill="#264653">${a.toFixed(0)}°</text>`;
  }).join('');
  // swashplate tilt
  const tilt = `<g transform="translate(270,200)">
    <ellipse cx="0" cy="0" rx="90" ry="${20 - Math.abs(s.cyclicPitch)*0.8}" fill="#FFD700" stroke="#264653" stroke-width="2" transform="rotate(${s.cyclicRoll*2})"/>
  </g>`;
  return `<svg viewBox="0 0 540 280">
    <rect width="540" height="280" fill="#B0E0E6"/>
    ${tilt}
    ${blades}
    <rect x="265" y="140" width="10" height="60" fill="#264653"/>
    <g transform="translate(20,20)">
      <text font-size="12" font-weight="bold" fill="#264653">collective = ${s.collective}°</text>
      <text y="18" font-size="12" font-weight="bold" fill="#E63946">cyclic pitch = ${s.cyclicPitch}°</text>
      <text y="36" font-size="12" font-weight="bold" fill="#457B9D">cyclic roll = ${s.cyclicRoll}°</text>
      <text y="56" font-size="11" fill="#264653">blade AoA varies as it rotates → asymmetric lift → tilt</text>
    </g>
  </svg>`;
}

MakerViz.create({
  mount: '#app',
  title: '🚁 Heli Swashplate',
  subtitle: 'Collective = total lift · Cyclic = tilt direction',
  vars: {
    rot: { label:'🔄 rot', value: 0, color:'#FF6B35', note:'°' }
  },
  extras: [
    { kind:'slider', id:'col', label:'Collective °', min:-5, max:15, value:5, step:1, onInput(v,s){ s.collective = v; }},
    { kind:'slider', id:'cp',  label:'Cyclic pitch °', min:-10, max:10, value:0, step:1, onInput(v,s){ s.cyclicPitch = v; }},
    { kind:'slider', id:'cr',  label:'Cyclic roll °',  min:-10, max:10, value:0, step:1, onInput(v,s){ s.cyclicRoll = v; }}
  ],
  lines: [
    'READ collective + cyclic commands',
    'SERVOS tilt swashplate',
    'Each blade\'s AoA = coll + cyc·cos(angle)',
    'ROTATE → uneven lift → drone tilts'
  ],
  phases: ['read','servo','aoa','rotate'],
  onInit(s){ s.collective = 5; s.cyclicPitch = 0; s.cyclicRoll = 0; s.rot = 0; },
  onReset(s){ s.collective = 5; s.cyclicPitch = 0; s.cyclicRoll = 0; s.rot = 0; },
  stage,
  run(phase, s, ui){
    if (phase === 'read') ui.activeLine(1);
    else if (phase === 'servo') ui.activeLine(2);
    else if (phase === 'aoa') ui.activeLine(3);
    else if (phase === 'rotate') { ui.activeLine(4); s.rot = (s.rot + 30) % 360; ui.setVar('rot', s.rot, { display: s.rot+'°' }); }
  }
});
</script>
</body></html>
