<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prop Balance / Notch Filter</title>
<link rel="stylesheet" href="maker-viz.css">
</head><body>
<a class="mv-nav" href="index.html">← Back</a>
<div id="app"></div>
<script src="maker-viz.js"></script>
<script>
function stage(s){
  const W=500, H=160, bins=64;
  // build spectrum with motor freq peak
  const spectrum = Array.from({length:bins}, (_,i) => {
    const f = i / bins * 400;
    let v = Math.random()*8 + 2;
    if (s.imbalance > 0) v += s.imbalance * 15 * Math.exp(-Math.pow(f - s.motorFreq, 2)/600);
    if (s.notch) v *= 1 - (s.notch * Math.exp(-Math.pow(f - s.motorFreq, 2)/100));
    return v;
  });
  return `<svg viewBox="0 0 540 240">
    <rect x="10" y="10" width="${W+20}" height="${H+20}" fill="#0A0F1E" stroke="#FFD700" stroke-width="3" rx="8"/>
    <text x="20" y="30" font-size="10" fill="#FFD700" font-weight="bold">FFT spectrum · motor freq ${s.motorFreq} Hz</text>
    ${spectrum.map((v,i)=>`<rect x="${10 + (i/bins)*W}" y="${10+H - Math.min(H, v*4)}" width="${W/bins - 1}" height="${Math.min(H, v*4)}" fill="${v>20?'#E63946':'#4ECDC4'}" />`).join('')}
    ${s.notch > 0 ? `<line x1="${10 + (s.motorFreq/400)*W}" y1="10" x2="${10 + (s.motorFreq/400)*W}" y2="${10+H}" stroke="#40BF4A" stroke-width="2" stroke-dasharray="4 4"/>` : ''}
    <text x="270" y="215" text-anchor="middle" font-size="12" fill="#264653">${s.notch > 0 ? '🛡️ notch ON — peak tamed' : s.imbalance > 0 ? '⚠️ vibration peak visible!' : '✅ clean'}</text>
  </svg>`;
}

MakerViz.create({
  mount: '#app',
  title: '🌀 Prop Balance & Notch Filter',
  subtitle: 'See bad vibration — then kill it with a notch!',
  vars: {
    motorFreq: { label:'🔄 motor Hz', value: 200, color:'#FFD700' },
    imbalance: { label:'⚖️ imbalance', value: 0.6, color:'#E63946' },
    notch:     { label:'🛡️ notch',     value: 0,   color:'#40BF4A' }
  },
  extras: [
    { kind:'slider', id:'fS', label:'Motor freq (Hz)', min:80, max:400, value:200, step:10, onInput(v,s){ s.motorFreq = v; }},
    { kind:'slider', id:'iS', label:'Imbalance',       min:0,  max:100, value:60,  step:5,  onInput(v,s){ s.imbalance = v/100; }},
    { kind:'toggle', id:'nT', label:'🛡️ Notch filter', value:false, onToggle(v,s){ s.notch = v ? 0.9 : 0; }}
  ],
  lines: [
    'READ gyro → FFT',
    'Peak shows motor vibration',
    'NOTCH at motor freq kills the peak',
    'PID now gets clean signal'
  ],
  phases: ['read','fft','notch','smooth'],
  onInit(s){ s.motorFreq = 200; s.imbalance = 0.6; s.notch = 0; },
  onReset(s){ s.motorFreq = 200; s.imbalance = 0.6; s.notch = 0; },
  stage,
  run(phase, s, ui){
    if (phase === 'read') ui.activeLine(1);
    else if (phase === 'fft') { ui.activeLine(2); ui.narrate(`peak @ ${s.motorFreq} Hz`); }
    else if (phase === 'notch') { ui.activeLine(3); ui.narrate(s.notch>0 ? '🛡️ notch active' : 'notch OFF'); }
    else if (phase === 'smooth') { ui.activeLine(4); }
  }
});
</script>
</body></html>
