<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rate vs Angle vs Horizon</title>
<link rel="stylesheet" href="maker-viz.css">
</head><body>
<a class="mv-nav" href="index.html">← Back</a>
<div id="app"></div>
<script src="maker-viz.js"></script>
<script>
function stage(s){
  const draw = (x, label, angle, color) => {
    return `<g transform="translate(${x},150)">
      <text y="-80" text-anchor="middle" font-size="12" font-weight="bold" fill="#264653">${label}</text>
      <g transform="rotate(${angle})">
        <rect x="-50" y="-5" width="100" height="10" fill="${color}" stroke="#264653" stroke-width="2" rx="3"/>
        <circle cx="-50" cy="0" r="6" fill="#FFD700"/>
        <circle cx="50" cy="0" r="6" fill="#FFD700"/>
      </g>
      <text y="60" text-anchor="middle" font-size="11" font-weight="bold" fill="${color}">${angle.toFixed(0)}°</text>
    </g>`;
  };
  return `<svg viewBox="0 0 540 260">
    <rect width="540" height="260" fill="#F4E8CB"/>
    <line x1="0" y1="150" x2="540" y2="150" stroke="#264653" stroke-dasharray="4 4"/>
    ${draw(100, 'ANGLE', s.angleA, '#40BF4A')}
    ${draw(270, 'HORIZON', s.angleH, '#FFD700')}
    ${draw(440, 'RATE (acro)', s.angleR, '#E63946')}
    <text x="270" y="240" text-anchor="middle" font-size="12" fill="#264653">stick=${s.stick} · Angle self-levels · Rate keeps rotating</text>
  </svg>`;
}

MakerViz.create({
  mount: '#app',
  title: '🎛️ Flight Modes Compared',
  subtitle: 'Same stick, three philosophies, very different feel!',
  vars: {
    angleA: { label:'🟢 Angle',   value: 0, color:'#40BF4A', note:'auto-level' },
    angleH: { label:'🟡 Horizon', value: 0, color:'#FFD700', note:'mix' },
    angleR: { label:'🔴 Rate',    value: 0, color:'#E63946', note:'no level' }
  },
  extras: [
    { kind:'slider', id:'stS', label:'🎮 Stick', min:-100, max:100, value:0, step:5, onInput(v,s){ s.stick = v; }}
  ],
  lines: [
    'ANGLE mode: stick = target angle, returns to 0 when released',
    'RATE mode: stick = target rotation speed — keeps spinning',
    'HORIZON: angle near center, rate at extremes',
    'APPLY each mode\'s rule → update angles'
  ],
  phases: ['angle','rate','horizon','apply'],
  onInit(s){ s.stick = 0; s.angleA = 0; s.angleH = 0; s.angleR = 0; },
  onReset(s){ s.stick = 0; s.angleA = 0; s.angleH = 0; s.angleR = 0; },
  stage,
  run(phase, s, ui){
    if (phase === 'angle')   { ui.activeLine(1); s.angleA = s.stick * 0.6; ui.setVar('angleA', s.angleA, { display: Math.round(s.angleA)+'°' }); ui.narrate(`🟢 angle = stick × 0.6 = ${s.angleA.toFixed(0)}°`); }
    else if (phase === 'rate') { ui.activeLine(2); s.angleR = Math.max(-90, Math.min(90, s.angleR + s.stick * 0.15)); ui.setVar('angleR', s.angleR, { display: Math.round(s.angleR)+'°' }); ui.narrate(`🔴 rate → integrated`); }
    else if (phase === 'horizon') { ui.activeLine(3); const mix = Math.abs(s.stick)/100; s.angleH = s.stick * 0.6 * (1-mix) + Math.max(-90, Math.min(90, s.angleH + s.stick * 0.15)) * mix; ui.setVar('angleH', s.angleH, { display: Math.round(s.angleH)+'°' }); }
    else if (phase === 'apply') { ui.activeLine(4); ui.narrate('🎬 applied — observe!'); }
  }
});
</script>
</body></html>
