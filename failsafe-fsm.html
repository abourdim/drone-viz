<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Failsafe FSM</title>
<link rel="stylesheet" href="maker-viz.css">
</head><body>
<a class="mv-nav" href="index.html">← Back</a>
<div id="app"></div>
<script src="maker-viz.js"></script>
<script>
const STATES = [
  { id:'DISARMED', x:80,  y:200, color:'#A8DADC', emoji:'🛑' },
  { id:'ARMED',    x:220, y:200, color:'#FFD700', emoji:'✅' },
  { id:'FLYING',   x:360, y:80,  color:'#40BF4A', emoji:'🚁' },
  { id:'AUTO_LAND',x:360, y:200, color:'#E63946', emoji:'🪂' },
  { id:'LAND_NOW', x:220, y:80,  color:'#FF6B35', emoji:'⚠️' }
];
const EDGES = [
  ['DISARMED','ARMED','arm'],
  ['ARMED','FLYING','throttle up'],
  ['FLYING','AUTO_LAND','RC lost'],
  ['FLYING','LAND_NOW','batt low'],
  ['LAND_NOW','DISARMED','landed'],
  ['AUTO_LAND','DISARMED','landed']
];
function stage(s){
  const find = id => STATES.find(x=>x.id===id);
  const edges = EDGES.map(([a,b,lbl]) => {
    const A = find(a), B = find(b);
    const active = s.state === a && s.next === b;
    return `<g>
      <line x1="${A.x}" y1="${A.y}" x2="${B.x}" y2="${B.y}" stroke="${active?'#FF6B35':'#264653'}" stroke-width="${active?4:2}" marker-end="url(#ar)"/>
      <text x="${(A.x+B.x)/2}" y="${(A.y+B.y)/2 - 6}" text-anchor="middle" font-size="9" font-weight="bold" fill="${active?'#FF6B35':'#666'}">${lbl}</text>
    </g>`;
  }).join('');
  const nodes = STATES.map(st => {
    const active = s.state === st.id;
    return `<g>
      <circle cx="${st.x}" cy="${st.y}" r="${active?32:26}" fill="${st.color}" stroke="${active?'#FF6B35':'#264653'}" stroke-width="${active?5:3}">${active?'<animate attributeName="r" values="30;36;30" dur="0.8s" repeatCount="indefinite"/>':''}</circle>
      <text x="${st.x}" y="${st.y-2}" text-anchor="middle" font-size="16">${st.emoji}</text>
      <text x="${st.x}" y="${st.y+14}" text-anchor="middle" font-size="9" font-weight="bold" fill="#264653">${st.id}</text>
    </g>`;
  }).join('');
  return `<svg viewBox="0 0 500 280">
    <defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#264653"/></marker></defs>
    ${edges}${nodes}
    <g transform="translate(20,20)">
      <text font-size="11" font-weight="bold" fill="#264653">sensors:</text>
      <circle cx="10" cy="18" r="6" fill="${s.armSwitch?'#40BF4A':'#ccc'}"/><text x="22" y="22" font-size="10">arm switch</text>
      <circle cx="10" cy="38" r="6" fill="${s.throttleUp?'#40BF4A':'#ccc'}"/><text x="22" y="42" font-size="10">throttle up</text>
      <circle cx="10" cy="58" r="6" fill="${s.rcLost?'#E63946':'#ccc'}"/><text x="22" y="62" font-size="10">RC lost</text>
      <circle cx="10" cy="78" r="6" fill="${s.battLow?'#E63946':'#ccc'}"/><text x="22" y="82" font-size="10">batt low</text>
    </g>
  </svg>`;
}

MakerViz.create({
  mount: '#app',
  title: '🛡️ Failsafe State Machine',
  subtitle: 'The logic that actually saves drones!',
  vars: {
    state: { label:'🧠 state', value:'DISARMED', color:'#FF6B35' }
  },
  extras: [
    { kind:'toggle', id:'arm',  label:'🔑 Arm switch',    value:false, onToggle(v,s){ s.armSwitch = v; }},
    { kind:'toggle', id:'thr',  label:'🚁 Throttle up',   value:false, onToggle(v,s){ s.throttleUp = v; }},
    { kind:'toggle', id:'rc',   label:'📡 RC LOST',       value:false, onToggle(v,s){ s.rcLost = v; }},
    { kind:'toggle', id:'bat',  label:'🔋 BATTERY LOW',   value:false, onToggle(v,s){ s.battLow = v; }}
  ],
  lines: [
    'SENSE arm switch, RC link, battery',
    'MATCH (state, event) → transition',
    'UPDATE state',
    'ACT per state (disarm motors if needed)'
  ],
  phases: ['sense','match','update','act'],
  onInit(s){
    s.state = 'DISARMED'; s.next = null;
    s.armSwitch = false; s.throttleUp = false; s.rcLost = false; s.battLow = false;
  },
  onReset(s){
    s.state = 'DISARMED'; s.next = null;
    s.armSwitch = false; s.throttleUp = false; s.rcLost = false; s.battLow = false;
  },
  stage,
  run(phase, s, ui){
    if (phase === 'sense') ui.activeLine(1);
    else if (phase === 'match') {
      ui.activeLine(2);
      s.next = null;
      if (s.state === 'DISARMED' && s.armSwitch) s.next = 'ARMED';
      else if (s.state === 'ARMED' && s.throttleUp) s.next = 'FLYING';
      else if (s.state === 'FLYING' && s.battLow) s.next = 'LAND_NOW';
      else if (s.state === 'FLYING' && s.rcLost) s.next = 'AUTO_LAND';
      else if ((s.state === 'LAND_NOW' || s.state === 'AUTO_LAND') && !s.throttleUp) s.next = 'DISARMED';
      else if (s.state === 'ARMED' && !s.armSwitch) s.next = 'DISARMED';
      ui.narrate(s.next ? `${s.state} → ${s.next}` : `stay ${s.state}`);
    }
    else if (phase === 'update') { ui.activeLine(3); if (s.next) { s.state = s.next; ui.setVar('state', s.state, { flash:true }); } }
    else if (phase === 'act') { ui.activeLine(4); ui.narrate(`state = ${s.state}`); }
  }
});
</script>
</body></html>
